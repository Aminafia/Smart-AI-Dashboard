<app-page-header title="Job History" subtitle="View previously executed AI jobs"></app-page-header>

<app-page-card>

    <table mat-table [dataSource]="jobs">
        <ng-container matColumnDef="jobType">
            <th mat-header-cell *matHeaderCellDef>Job Type</th>
            <td mat-cell *matCellDef="let job">
                {{ job.jobType }}
            </td>
        </ng-container>

        <ng-container matColumnDef="prompt">
            <th mat-header-cell *matHeaderCellDef>Prompt</th>
            <td mat-cell *matCellDef="let job">
                {{ job.prompt }}
            </td>
        </ng-container>

        <ng-container matColumnDef="status">
            <th mat-header-cell *matHeaderCellDef>Status</th>
            <td mat-cell *matCellDef="let job">
                @switch (job.status) {
                    @case ('Completed') { <mat-chip>Completed</mat-chip> }
                    @case ('Processing') { <mat-chip>Processing</mat-chip> }
                    @case ('Pending') { <mat-chip>Pending</mat-chip> }
                    @case ('Failed') { <mat-chip>Failed</mat-chip> }
                    @default { <mat-chip>{{ job.status }}</mat-chip> }  
                }
            </td>
        </ng-container>

        <ng-container matColumnDef="createdAt">
            <th mat-header-cell *matHeaderCellDef>Created</th>
            <td mat-cell *matCellDef="let job">
                {{ job.createdAt | date:'short' }}
            </td>
        </ng-container>

        <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef>Actions</th>
            <td mat-cell *matCellDef="let job">
                <button mat-icon-button (click)="viewJob(job)">
                    <mat-icon>visibility</mat-icon>
                </button>
            </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>

    </table>
</app-page-card>
