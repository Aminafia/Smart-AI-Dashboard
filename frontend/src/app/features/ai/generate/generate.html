<div class="max-w-4xl">

    <h1 class="text-3xl font-bold mb-6">AI Generate</h1>

    <mat-card>
        <mat-card-content>
            <form [formGroup]="generateForm">
                <mat-form-field appearance="outline" class="w-full">
                    <mat-label>Prompt</mat-label>
                    <textarea matInput rows="6" formControlName="prompt"></textarea>
                </mat-form-field>
            </form>
            <div class="mt-4">
                <button mat-raised-button color="primary" (click)="onGenerate()">Generate</button>
            </div>
        </mat-card-content>
    </mat-card>

    <mat-card class="mt-6">
        <mat-card-content>
            <h2 class="font-semibold mb-4">Result</h2>
            <div *ngIf="jobId">
                <p>Job Id: {{ jobId }} </p>
                <p>Status: {{ currentStatus }} </p>
            </div>
            <div *ngIf="isLoading">
                <p>Generating response...</p>
            </div>
            <div *ngIf="resultText" class="result-content">
                <pre> {{ resultText }} </pre>
            </div>
            <div *ngIf="errorMessage">
                <p class="text-red-600">{{ errorMessage }}</p>
            </div>
        </mat-card-content>
    </mat-card>

</div>
