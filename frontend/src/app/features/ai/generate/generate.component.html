<div class="max-w-4xl">
    <app-page-header title="Generate AI Content" subtitle="Generate AI responses using your configured provider.">
    </app-page-header>
    <app-workspace-section title="Prompt" subtitle="Describe what you want the AI to generate.">
        <form [formGroup]="generateForm">
            <mat-form-field appearance="outline" class="w-full">
                <mat-label>Prompt</mat-label>
                <textarea matInput rows="6" formControlName="prompt"></textarea>
            </mat-form-field>
        </form>
        <button mat-flat-button color="primary" (click)="onGenerate()">Generate</button>
    </app-workspace-section>
    <div class="mt-6">
        <app-workspace-section title="Result">
            <app-result-viewer
                [html]="renderedResult"
                [status]="getStatusText(currentStatus)"
                [error]="errorMessage"
                emptyTitle="No Results Yet"
                emptyMessage="Generate AI content to see the response here."
                emptyIcon="auto_awesome">
            </app-result-viewer>
        </app-workspace-section>
    </div>


</div>
